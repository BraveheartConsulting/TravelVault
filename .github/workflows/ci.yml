name: CI

# This workflow assumes the TravelVault project is at the repository root.
# It currently lives under `travelvault/` in the braveheart_devteam staging
# branch; once transplanted to BraveheartConsulting/TravelVault it runs as-is.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
